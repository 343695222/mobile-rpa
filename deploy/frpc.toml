# ============================================
# frp 客户端配置 (frpc.toml)
# 运行位置：Android 手机（通过 Termux 运行）
# 用途：将手机端 AutoX.js HTTP 服务（端口 9500）
#       通过隧道映射到云服务器的端口 9501
# ============================================

# 云服务器 frp 服务端地址和端口
serverAddr = "101.32.242.14"
serverPort = 7000

# 认证令牌，必须与服务端 frps.toml 中的令牌一致
auth.token = "openclaw-frp-2024"

# ============================================
# 日志配置
# ============================================
log.to = "./frpc.log"
log.level = "info"
log.maxDays = 3

# ============================================
# AutoX.js HTTP 服务隧道
# 将手机本地 9500 端口映射到云服务器 9501 端口
# 映射后可通过 http://localhost:9501 在云服务器上
# 访问手机端 AutoX.js 服务
# ============================================
[[proxies]]
name = "autox-http"
type = "tcp"
localIP = "127.0.0.1"
localPort = 9500
remotePort = 9501
