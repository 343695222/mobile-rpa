# ============================================
# frp 服务端配置 (frps.toml)
# 运行位置：云服务器 (101.32.242.14)
# 用途：接收手机端 frp 客户端连接，将手机端
#       AutoX.js HTTP 服务暴露到云服务器本地端口
# ============================================

# frp 控制通道监听端口，客户端通过此端口连接
bindPort = 7000

# 认证令牌，客户端必须使用相同的令牌才能连接
auth.token = "openclaw-frp-2024"

# ============================================
# Web 管理面板配置（可选，用于监控隧道状态）
# 访问地址：http://101.32.242.14:7500
# ============================================
webServer.addr = "0.0.0.0"
webServer.port = 7500
webServer.user = "admin"
webServer.password = "admin123"

# ============================================
# 日志配置
# ============================================
log.to = "./frps.log"
log.level = "info"
log.maxDays = 7
